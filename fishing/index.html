<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ウキウキフィッシング！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrap">

    <!-- HUD -->
    <div id="hud">
      <div id="timer-box">
        <span class="hud-label">TIME</span>
        <span id="timer">60.0</span>
      </div>
      <div id="score-box">
        <span class="hud-label">SCORE</span>
        <span id="score-display">0</span>
      </div>
      <div id="hi-box">
        <span class="hud-label">BEST</span>
        <span id="highscore-display">0</span>
      </div>
      <div id="hud-btns">
        <button id="mute-btn" title="ミュート切替">🔊</button>
      </div>
    </div>

    <!-- Scene canvas -->
    <canvas id="scene-canvas"></canvas>

    <!-- Gauges (hidden on title/result) -->
    <div id="gauges" class="hidden">

      <div id="tension-section">
        <div class="gauge-label-row">
          <span class="gauge-label">テンション (T)</span>
          <span id="tension-value">50</span>
        </div>
        <div id="tension-wrap">
          <div id="tension-safe"></div>
          <div id="tension-fill"></div>
          <div id="tension-ptr"></div>
        </div>
        <div class="gauge-tick-row">
          <span>0</span>
          <span>SAFE: 30–75</span>
          <span>100</span>
        </div>
      </div>

      <div id="fishHp-section">
        <div class="gauge-label-row">
          <span class="gauge-label">魚のHP</span>
          <span id="fishHp-value">100%</span>
        </div>
        <div id="fishHp-wrap">
          <div id="fishHp-fill"></div>
        </div>
      </div>

    </div><!-- /gauges -->

    <!-- Flash message -->
    <div id="flash-msg"></div>

    <!-- Controls hint -->
    <div id="controls-hint"></div>

    <!-- Title overlay -->
    <div id="title-screen" class="overlay">
      <div class="overlay-box">
        <h1>🎣 ウキウキフィッシング！</h1>
        <p class="sub">60秒で最高スコアを目指せ！</p>
        <p class="title-hi">BEST：<span id="title-hi-score">0</span> pt</p>
        <div class="key-help">
          <p>【操作方法】</p>
          <p>キャスト：<kbd>Space</kbd> / <kbd>左クリック</kbd></p>
          <p>リール（巻く）：<kbd>Space長押し</kbd> / <kbd>左クリック長押し</kbd></p>
          <p>スラック（緩める）：<kbd>Shift長押し</kbd> / <kbd>右クリック長押し</kbd></p>
          <p>合わせ：食い込み後 <kbd>Space</kbd> / <kbd>左クリック</kbd></p>
        </div>
        <div class="title-btn-row">
          <button id="start-btn" class="big-btn">スタート</button>
          <button id="title-enc-btn" class="btn-sub">図鑑</button>
        </div>
      </div>
    </div>

    <!-- Result overlay -->
    <div id="result-screen" class="overlay hidden">
      <div class="overlay-box result-box">
        <h2>ゲーム終了</h2>
        <div id="result-score-line"></div>
        <div id="result-hi-line"></div>
        <div id="result-catches"></div>
        <div class="result-btn-row">
          <button id="retry-btn" class="big-btn">もう一度</button>
          <button id="to-title-btn" class="btn-sub">タイトルへ</button>
        </div>
      </div>
    </div>

  </div><!-- /game-wrap -->

  <!-- Encyclopedia modal -->
  <div id="enc-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2>図鑑</h2>
        <button id="close-enc-btn">✕</button>
      </div>
      <div class="modal-body">
        <table id="enc-table">
          <thead>
            <tr>
              <th>#</th>
              <th>名前</th>
              <th>★</th>
              <th>釣った数</th>
              <th>最大長(cm)</th>
              <th>最大重(kg)</th>
            </tr>
          </thead>
          <tbody id="enc-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
