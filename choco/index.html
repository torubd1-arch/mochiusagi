<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チョコキャッチ！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ================================================================
//  定数
// ================================================================
const CANVAS_W            = 800;
const CANVAS_H            = 600;
const GAME_DURATION       = 30;
const PLAYER_SPEED        = 320;
const PLAYER_W            = 44;
const PLAYER_H            = 90;
const STUN_DURATION       = 1.5;
const STUN_BLINK_INTERVAL = 0.2;
const SPAWN_RATE_MIN      = 3;
const SPAWN_RATE_MAX      = 5;
const FALL_SPEED_MIN      = 250;
const FALL_SPEED_MAX      = 450;
const CHOCO_SIZE          = 32;
const DUMBBELL_BAR_W      = 48;
const DUMBBELL_BALL_R     = 11;
const POPUP_DURATION      = 0.9;
const NEW_POPUP_DURATION  = 0.8;
const SPECIAL_POPUP_DUR   = 0.85;
const GROUND_Y            = CANVAS_H - 70;
const LS_KEY              = 'chocoGame_highScore';
const LAST_SECONDS        = 5;
const RARE_CHANCE         = 0.08;

// スコア基本値
const BROWN_CHOCO_SCORE   = 1;
const PURPLE_CHOCO_SCORE  = 2;
const CROWN_SCORE         = 5;
const HAT_SCORE           = 3;
const HELD_SCORE          = 3;

// 出現比率（合計 1.0）
const SPAWN_RATIO_BROWN    = 0.45;
const SPAWN_RATIO_PURPLE   = 0.10;
const SPAWN_RATIO_DUMBBELL = 0.18;
const SPAWN_RATIO_HAT      = 0.12;
// HELD = 残り 0.15

// 王冠
const CROWN_SPAWN_MIN_SEC  = 5;
const CROWN_SPAWN_MAX_SEC  = 20;
const CROWN_W              = 40;
const CROWN_H              = 26;

// 帽子・手持ち当たり判定
const HAT_ITEM_W           = 36;
const HAT_ITEM_H           = 36;
const HELD_ITEM_W          = 36;
const HELD_ITEM_H          = 36;

// 音響
const BGM_BPM              = 150;
const BGM_BPM_FAST         = 195;
const BGM_VOL_NORM         = 0.40;
const BGM_VOL_LAST         = 0.65;

// ================================================================
//  アイテム定義
// ================================================================
const HAT_TYPES  = ['cap', 'beanie', 'top_hat', 'wizard', 'helmet'];
const HELD_TYPES = [
  'controller', 'tote', 'backpack', 'suitcase', 'box',
  'bicycle', 'bobblehead', 'icecream',
  'camera', 'umbrella', 'sword_toy', 'book', 'flower',
  'balloon', 'smartphone', 'flashlight', 'microphone',
  'game_console', 'plush', 'donut', 'pizza', 'cup',
  'paintbrush', 'guitar', 'tennis_racket', 'baseball',
  'key', 'treasure_map', 'robot', 'star_wand',
];
const ALL_HAT_KEYS = [...HAT_TYPES, 'crown']; // 6種

const HAT_NAMES = {
  cap: 'キャップ', beanie: 'ニット帽', top_hat: 'シルクハット',
  wizard: '魔法帽', helmet: 'ヘルメット', crown: '王冠',
};
const HELD_NAMES = {
  controller: 'コントローラー', tote: 'トートバッグ', backpack: 'リュック',
  suitcase: 'スーツケース', box: 'ハコ',
  bicycle: '自転車', bobblehead: 'ボブルヘッド', icecream: 'アイスクリーム',
  camera: 'カメラ', umbrella: 'かさ', sword_toy: 'おもちゃの剣',
  book: 'ほん', flower: 'はな', balloon: 'ふうせん',
  smartphone: 'スマホ', flashlight: 'かいちゅう電灯', microphone: 'マイク',
  game_console: 'ゲーム機', plush: 'ぬいぐるみ', donut: 'ドーナツ',
  pizza: 'ピザ', cup: 'コップ', paintbrush: 'えふで',
  guitar: 'ギター', tennis_racket: 'テニスラケット', baseball: 'やきゅうボール',
  key: 'かぎ', treasure_map: 'たからの地図', robot: 'ロボット', star_wand: 'ほしのつえ',
};

// ================================================================
//  Lucky Item（日替わり）
// ================================================================
const LUCKY_POOL = [...HAT_TYPES, ...HELD_TYPES]; // 35種

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function hashStringToInt(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h * 31) + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function selectLuckyItem() {
  return LUCKY_POOL[hashStringToInt(getTodayKey()) % LUCKY_POOL.length];
}
const luckyItem = selectLuckyItem();
function getLuckyItemName() {
  return HAT_NAMES[luckyItem] || HELD_NAMES[luckyItem] || luckyItem;
}

// ================================================================
//  スコア計算
// ================================================================
function calculateScore(itemType, subType, variant) {
  if (itemType === 'crown') return CROWN_SCORE;
  const base = { brown_choco: BROWN_CHOCO_SCORE, purple_choco: PURPLE_CHOCO_SCORE, hat: HAT_SCORE, held: HELD_SCORE }[itemType] || 0;
  let mult = 1;
  if (variant === 'rare') mult *= 2;
  if (subType && subType === luckyItem) mult *= 2;
  return base * mult;
}

// ================================================================
//  図鑑システム v2
// ================================================================
const COLLECTION_KEY = 'collection_v2';

function makeEmptyCollection() {
  const hats = {};
  for (const k of ALL_HAT_KEYS) hats[k] = { normal: 0, rare: 0 };
  const held = {};
  for (const k of HELD_TYPES) held[k] = { normal: 0, rare: 0 };
  return { version: 2, hats, held, meta: { plays: 0, bestScore: 0 } };
}
function loadCollection() {
  try {
    const raw = localStorage.getItem(COLLECTION_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.version === 2) {
        if (!d.hats) d.hats = {};
        if (!d.held) d.held = {};
        if (!d.meta) d.meta = { plays: 0, bestScore: 0 };
        for (const k of ALL_HAT_KEYS) if (!d.hats[k]) d.hats[k] = { normal: 0, rare: 0 };
        for (const k of HELD_TYPES)   if (!d.held[k]) d.held[k] = { normal: 0, rare: 0 };
        return d;
      }
    }
  } catch (e) {}
  return makeEmptyCollection();
}
function saveCollection() {
  localStorage.setItem(COLLECTION_KEY, JSON.stringify(collection));
}
let collection = loadCollection();

// ================================================================
//  BGMフレーズ
// ================================================================
const BGM_NOTES = [
  [523.25,1],[659.25,1],[783.99,1],[659.25,1],
  [587.33,1],[698.46,1],[880.00,1],[698.46,1],
  [659.25,1],[783.99,1],[987.77,1],[783.99,1],
  [1046.50,2],[783.99,2],
];

// ================================================================
//  Canvas
// ================================================================
const canvas = document.getElementById('gameCanvas');
canvas.width = CANVAS_W; canvas.height = CANVAS_H;
const ctx = canvas.getContext('2d');

// ================================================================
//  音響システム
// ================================================================
let audioCtx=null, masterGain=null, bgmGain=null, seGain=null;
let bgmSchedulerTimer=null, bgmNoteIndex=0, bgmNextTime=0, soundOn=true;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value=0.25; masterGain.connect(audioCtx.destination);
  bgmGain = audioCtx.createGain(); bgmGain.gain.value=BGM_VOL_NORM; bgmGain.connect(masterGain);
  seGain  = audioCtx.createGain(); seGain.gain.value=1.0; seGain.connect(masterGain);
}
function scheduleOneBGMNote(ni, st) {
  const [freq, beats] = BGM_NOTES[ni];
  const isFast = (timeLeft<=LAST_SECONDS && gameState==='playing');
  const dur = (60/(isFast?BGM_BPM_FAST:BGM_BPM)/2)*beats;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain); osc.type='square'; osc.frequency.value=freq;
  g.gain.setValueAtTime(0.3,st); g.gain.exponentialRampToValueAtTime(0.001,st+dur*0.82);
  osc.start(st); osc.stop(st+dur); return dur;
}
function scheduleBGMNotes() {
  if (!audioCtx||!soundOn||gameState!=='playing') return;
  bgmGain.gain.setTargetAtTime(timeLeft<=LAST_SECONDS?BGM_VOL_LAST:BGM_VOL_NORM, audioCtx.currentTime, 0.05);
  while (bgmNextTime < audioCtx.currentTime+0.12) {
    const dur=scheduleOneBGMNote(bgmNoteIndex,bgmNextTime);
    bgmNextTime+=dur; bgmNoteIndex=(bgmNoteIndex+1)%BGM_NOTES.length;
  }
  bgmSchedulerTimer=setTimeout(scheduleBGMNotes,50);
}
function playBGM() {
  if (!audioCtx||!soundOn) return;
  stopBGM(); bgmNoteIndex=0; bgmNextTime=audioCtx.currentTime+0.05; scheduleBGMNotes();
}
function stopBGM() {
  if (bgmSchedulerTimer!==null){clearTimeout(bgmSchedulerTimer);bgmSchedulerTimer=null;}
}

function playSE(type) {
  if (!audioCtx||!soundOn) return;
  const t=audioCtx.currentTime;
  const tone=(freqs,dur=0.08,vol=0.18,wave='square',gap=0.07)=>{
    freqs.forEach((freq,i)=>{
      const nt=t+i*gap, osc=audioCtx.createOscillator(), g=audioCtx.createGain();
      osc.connect(g); g.connect(seGain); osc.type=wave; osc.frequency.setValueAtTime(freq,nt);
      osc.frequency.linearRampToValueAtTime(freq*1.1,nt+dur);
      g.gain.setValueAtTime(vol,nt); g.gain.exponentialRampToValueAtTime(0.001,nt+dur);
      osc.start(nt); osc.stop(nt+dur);
    });
  };
  if (type==='chocolate')   tone([800,1200],0.08,0.15,'square',0.08);
  else if (type==='purple_choco') tone([1200,1600],0.10,0.18,'square',0.10);
  else if (type==='hat')    tone([600,900],0.07,0.18,'square',0.07);
  else if (type==='held')   tone([750,950],0.07,0.18,'square',0.07);
  else if (type==='rare')   tone([700,1050,1300],0.09,0.20,'square',0.09);
  else if (type==='lucky')  tone([900,1100,1400,1700],0.10,0.22,'triangle',0.09);
  else if (type==='new_item') tone([700,1000,1400],0.09,0.22,'square',0.10);
  else if (type==='crown')  tone([800,1200,1600],0.07,0.22,'square',0.07);
  else if (type==='dumbbell'){
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(seGain);osc.type='square';
    osc.frequency.setValueAtTime(300,t);osc.frequency.linearRampToValueAtTime(120,t+0.2);
    g.gain.setValueAtTime(0.30,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    osc.start(t);osc.stop(t+0.2);
  } else if (type==='start') tone([400,800],0.15,0.20,'square',0.15);
  else if (type==='gameover'){
    [523.25,392.00,261.63].forEach((freq,i)=>{
      const nt=t+i*0.13,osc=audioCtx.createOscillator(),g=audioCtx.createGain();
      osc.connect(g);g.connect(seGain);osc.type='square';osc.frequency.value=freq;
      g.gain.setValueAtTime(0.25,nt);g.gain.exponentialRampToValueAtTime(0.001,nt+0.11);
      osc.start(nt);osc.stop(nt+0.12);
    });
  }
}

// ================================================================
//  ゲーム変数
// ================================================================
let gameState='title', score=0, timeLeft=GAME_DURATION;
let highScore=Number(localStorage.getItem(LS_KEY)||0);
let lastTime=0, spawnTimer=0, timerBlinkTimer=0, timerBlinkVisible=true;
let crownSpawnTime=0, crownSpawned=false, crownCollected=false;
let crownFlashTimer=0, crownGetTimer=0;
let screenFlashTimer=0, screenFlashColor='#FFFFFF';
let specialPopupText='', specialPopupTimer=0;
let sessionHats=[], sessionHeld=[], sessionCrown=false;
let collectionTab='hats';

/** @type {Array} */ let items=[];
/** @type {Array} */ let popups=[];
/** @type {Array} */ let newPopups=[];

// ================================================================
//  プレイヤー
// ================================================================
const player={
  x:CANVAS_W/2, y:GROUND_Y,
  stunTimer:0, blinkTimer:0, blinkVisible:true,
  legAngle:0, legSwingDir:1, isMoving:false,
  hasCrown:false, hatType:null, heldType:null,
};

// ================================================================
//  入力
// ================================================================
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ') tryStart();
  if(e.key==='Escape'&&gameState==='collection') gameState='title';
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ================================================================
//  ユーティリティ
// ================================================================
const rand=(a,b)=>Math.random()*(b-a)+a;
function fillRoundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();ctx.fill();
}
function inRect(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}

// ================================================================
//  ゲームリセット
// ================================================================
function resetGame(){
  score=0; timeLeft=GAME_DURATION; items=[]; popups=[]; newPopups=[];
  spawnTimer=1/rand(SPAWN_RATE_MIN,SPAWN_RATE_MAX); lastTime=0;
  timerBlinkTimer=0; timerBlinkVisible=true;
  crownSpawnTime=rand(CROWN_SPAWN_MIN_SEC,CROWN_SPAWN_MAX_SEC);
  crownSpawned=false; crownCollected=false; crownFlashTimer=0; crownGetTimer=0;
  screenFlashTimer=0; specialPopupText=''; specialPopupTimer=0;
  sessionHats=[]; sessionHeld=[]; sessionCrown=false;
  player.x=CANVAS_W/2; player.stunTimer=0; player.blinkTimer=0; player.blinkVisible=true;
  player.legAngle=0; player.legSwingDir=1; player.isMoving=false;
  player.hasCrown=false; player.hatType=null; player.heldType=null;
  collection.meta.plays=(collection.meta.plays||0)+1; saveCollection();
  gameState='playing'; playSE('start'); playBGM();
}
function tryStart(){
  if(gameState==='title'||gameState==='gameover'){initAudio();resetGame();}
}

// ================================================================
//  アイテム生成
// ================================================================
function spawnItem(){
  const r=Math.random();
  let type,subType=null,variant='normal';
  if(r<SPAWN_RATIO_BROWN) type='brown_choco';
  else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE) type='purple_choco';
  else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE+SPAWN_RATIO_DUMBBELL) type='dumbbell';
  else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE+SPAWN_RATIO_DUMBBELL+SPAWN_RATIO_HAT){
    type='hat'; subType=HAT_TYPES[Math.floor(Math.random()*HAT_TYPES.length)];
    variant=Math.random()<RARE_CHANCE?'rare':'normal';
  } else {
    type='held'; subType=HELD_TYPES[Math.floor(Math.random()*HELD_TYPES.length)];
    variant=Math.random()<RARE_CHANCE?'rare':'normal';
  }
  items.push({type,subType,variant,x:rand(60,CANVAS_W-60),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
}
function spawnCrown(){
  items.push({type:'crown',subType:null,variant:'normal',
    x:rand(80,CANVAS_W-80),y:-CROWN_H,speed:rand(FALL_SPEED_MIN*0.65,FALL_SPEED_MAX*0.65)});
}

// ================================================================
//  衝突判定
// ================================================================
function checkCollision(item){
  const hw=PLAYER_W/2, hh=PLAYER_H/2;
  let iHW,iHH;
  if(item.type==='brown_choco'||item.type==='purple_choco'){iHW=CHOCO_SIZE/2;iHH=CHOCO_SIZE/2;}
  else if(item.type==='crown'){iHW=CROWN_W/2;iHH=CROWN_H/2;}
  else if(item.type==='hat'){iHW=HAT_ITEM_W/2;iHH=HAT_ITEM_H/2;}
  else if(item.type==='held'){iHW=HELD_ITEM_W/2;iHH=HELD_ITEM_H/2;}
  else{iHW=DUMBBELL_BAR_W/2+DUMBBELL_BALL_R;iHH=DUMBBELL_BALL_R;}
  return Math.abs(player.x-item.x)<hw+iHW && Math.abs(player.y-item.y)<hh+iHH;
}

// ================================================================
//  図鑑更新ヘルパー
// ================================================================
function collectHatHeld(category, key, variant, ix, iy){
  const tbl=(category==='hats')?collection.hats:collection.held;
  const entry=tbl[key];
  const isNew=(entry.normal+entry.rare)===0;
  entry[variant]=(entry[variant]||0)+1;
  saveCollection();
  if(isNew) newPopups.push({x:ix,y:iy-30,timer:NEW_POPUP_DURATION});
  return isNew;
}
function applySpecialEffect(isLucky,isRare){
  if(isLucky&&isRare){
    specialPopupText='RARE LUCKY! x4'; screenFlashColor='#FFD700';
  } else if(isLucky){
    specialPopupText='LUCKY! x2'; screenFlashColor='#FFFF88';
  } else {
    specialPopupText='RARE! x2'; screenFlashColor='#CC88FF';
  }
  specialPopupTimer=SPECIAL_POPUP_DUR; screenFlashTimer=0.22;
  playSE(isLucky?'lucky':'rare');
}

// ================================================================
//  更新
// ================================================================
function update(timestamp){
  if(gameState!=='playing') return;
  if(lastTime===0){lastTime=timestamp;return;}
  const dt=Math.min((timestamp-lastTime)/1000,0.05); lastTime=timestamp;

  // タイマー
  timeLeft-=dt;
  if(timeLeft<=0){
    timeLeft=0;
    if(score>highScore){highScore=score;localStorage.setItem(LS_KEY,highScore);}
    if(score>(collection.meta.bestScore||0)){collection.meta.bestScore=score;saveCollection();}
    gameState='gameover'; stopBGM(); playSE('gameover'); return;
  }

  // 点滅・演出タイマー
  if(timeLeft<=LAST_SECONDS){
    timerBlinkTimer+=dt;
    if(timerBlinkTimer>=0.25){timerBlinkTimer=0;timerBlinkVisible=!timerBlinkVisible;}
  } else {timerBlinkTimer=0;timerBlinkVisible=true;}
  if(crownFlashTimer>0) crownFlashTimer=Math.max(0,crownFlashTimer-dt);
  if(crownGetTimer>0)   crownGetTimer  =Math.max(0,crownGetTimer  -dt);
  if(screenFlashTimer>0) screenFlashTimer=Math.max(0,screenFlashTimer-dt);
  if(specialPopupTimer>0) specialPopupTimer=Math.max(0,specialPopupTimer-dt);

  // スタン
  if(player.stunTimer>0){
    player.stunTimer-=dt; player.blinkTimer+=dt;
    if(player.blinkTimer>=STUN_BLINK_INTERVAL){player.blinkTimer=0;player.blinkVisible=!player.blinkVisible;}
    if(player.stunTimer<=0){player.stunTimer=0;player.blinkVisible=true;}
  }

  // 移動
  player.isMoving=false;
  if(player.stunTimer<=0){
    const left=keys['ArrowLeft']||keys['a']||keys['A'];
    const right=keys['ArrowRight']||keys['d']||keys['D'];
    if(left) {player.x-=PLAYER_SPEED*dt;player.isMoving=true;}
    if(right){player.x+=PLAYER_SPEED*dt;player.isMoving=true;}
    player.x=Math.max(PLAYER_W/2,Math.min(CANVAS_W-PLAYER_W/2,player.x));
  }

  // 足アニメ
  if(player.isMoving){
    player.legAngle+=player.legSwingDir*dt*7;
    if(Math.abs(player.legAngle)>0.55) player.legSwingDir*=-1;
  } else {player.legAngle*=0.85;if(Math.abs(player.legAngle)<0.01)player.legAngle=0;}

  // スポーン
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnTimer=1/rand(SPAWN_RATE_MIN,SPAWN_RATE_MAX);spawnItem();}
  const elapsed=GAME_DURATION-timeLeft;
  if(!crownSpawned&&elapsed>=crownSpawnTime){crownSpawned=true;spawnCrown();}

  // アイテム更新
  for(let i=items.length-1;i>=0;i--){
    const item=items[i];
    item.y+=item.speed*dt;
    if(item.y>CANVAS_H+40){items.splice(i,1);continue;}
    if(!checkCollision(item)) continue;

    if(item.type==='brown_choco'){
      score+=BROWN_CHOCO_SCORE;
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+1',color:'#FF8800'});
      playSE('chocolate');

    } else if(item.type==='purple_choco'){
      score+=PURPLE_CHOCO_SCORE;
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+2',color:'#CC88FF'});
      playSE('purple_choco');

    } else if(item.type==='crown'){
      score+=CROWN_SCORE;
      crownCollected=true; player.hasCrown=true;
      crownFlashTimer=0.2; crownGetTimer=0.8; sessionCrown=true;
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+5',color:'#FFD700'});
      const crownNew=(collection.hats['crown'].normal+collection.hats['crown'].rare)===0;
      collection.hats['crown'].normal+=1; saveCollection();
      if(crownNew) newPopups.push({x:item.x,y:item.y-40,timer:NEW_POPUP_DURATION});
      playSE('crown');

    } else if(item.type==='hat'){
      const gain=calculateScore('hat',item.subType,item.variant);
      score+=gain;
      player.hatType=item.subType; sessionHats.push(item.subType);
      const isLucky=item.subType===luckyItem, isRare=item.variant==='rare';
      const pColor=isRare?'#FFD700':(isLucky?'#FFFF44':'#88FF88');
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+'+gain,color:pColor});
      const isNew=collectHatHeld('hats',item.subType,item.variant,item.x,item.y);
      if(isLucky||isRare) applySpecialEffect(isLucky,isRare);
      else if(isNew) playSE('new_item');
      else playSE('hat');

    } else if(item.type==='held'){
      const gain=calculateScore('held',item.subType,item.variant);
      score+=gain;
      player.heldType=item.subType; sessionHeld.push(item.subType);
      const isLucky=item.subType===luckyItem, isRare=item.variant==='rare';
      const pColor=isRare?'#FFD700':(isLucky?'#FFFF44':'#AADDFF');
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+'+gain,color:pColor});
      const isNew=collectHatHeld('held',item.subType,item.variant,item.x,item.y);
      if(isLucky||isRare) applySpecialEffect(isLucky,isRare);
      else if(isNew) playSE('new_item');
      else playSE('held');

    } else if(item.type==='dumbbell'&&player.stunTimer<=0){
      player.stunTimer=STUN_DURATION; player.blinkTimer=0; player.blinkVisible=true;
      playSE('dumbbell');
    }
    items.splice(i,1);
  }

  // ポップアップ更新
  for(let i=popups.length-1;i>=0;i--){
    popups[i].timer-=dt; popups[i].y-=50*dt;
    if(popups[i].timer<=0) popups.splice(i,1);
  }
  for(let i=newPopups.length-1;i>=0;i--){
    newPopups[i].timer-=dt; newPopups[i].y-=35*dt;
    if(newPopups[i].timer<=0) newPopups.splice(i,1);
  }
}

// ================================================================
//  描画メイン
// ================================================================
function draw(){
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  drawBackground();
  if(gameState==='title'){
    drawTitle();
  } else if(gameState==='collection'){
    drawCollection();
  } else {
    for(const item of items){
      if(item.type==='brown_choco') drawChocolate(item,false);
      else if(item.type==='purple_choco') drawChocolate(item,true);
      else if(item.type==='crown') drawCrownItem(item);
      else if(item.type==='hat') drawFallingHat(item);
      else if(item.type==='held') drawFallingHeld(item);
      else drawDumbbell(item);
    }
    drawPlayer();
    drawHUD();
    drawPopups();
    drawNewPopups();
    drawSpecialPopup();
    if(crownFlashTimer>0){
      ctx.save();ctx.globalAlpha=(crownFlashTimer/0.2)*0.65;
      ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);ctx.restore();
    }
    if(screenFlashTimer>0){
      ctx.save();ctx.globalAlpha=(screenFlashTimer/0.22)*0.40;
      ctx.fillStyle=screenFlashColor;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);ctx.restore();
    }
    if(crownGetTimer>0){
      ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.globalAlpha=Math.min(1,crownGetTimer/0.25);
      ctx.font='bold 54px sans-serif';ctx.shadowColor='#FF8800';ctx.shadowBlur=22;
      ctx.fillStyle='#FFD700';ctx.fillText('👑 CROWN GET!',CANVAS_W/2,CANVAS_H/2);
      ctx.shadowBlur=0;ctx.restore();
    }
    if(gameState==='gameover') drawGameOver();
  }
  drawSoundButton();
}

// ────────────────────────────────────────────────────────────────
//  背景
// ────────────────────────────────────────────────────────────────
function drawBackground(){
  if(gameState==='collection'){
    const g=ctx.createLinearGradient(0,0,0,CANVAS_H);
    g.addColorStop(0,'#0d0d2e');g.addColorStop(1,'#1a1a3e');
    ctx.fillStyle=g;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);return;
  }
  const g=ctx.createLinearGradient(0,0,0,CANVAS_H);
  g.addColorStop(0,'#87CEEB');g.addColorStop(1,'#D0EEFF');
  ctx.fillStyle=g;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  const gt=GROUND_Y+PLAYER_H/2+2;
  ctx.fillStyle='#A0785A';ctx.fillRect(0,gt,CANVAS_W,CANVAS_H-gt);
  ctx.fillStyle='#4CAF50';ctx.fillRect(0,gt,CANVAS_W,8);
}

      ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(3,2);ctx.moveTo(3,-4);ctx.lineTo(-3,2);ctx.stroke();

      ctx.beginPath();ctx.moveTo(-8,-8);ctx.lineTo(-4,-6);ctx.lineTo(0,-8);ctx.lineTo(4,-4);ctx.stroke();
      break;
    case 'robot':

      ctx.strokeStyle='#7799BB';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(0,-22);ctx.stroke();
      ctx.fillStyle='#FFFF00';ctx.beginPath();ctx.arc(0,-22,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#334455';ctx.fillRect(-6,-4,12,3);
      ctx.fillStyle='#FF2222';ctx.beginPath();ctx.arc(-5,5,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#22FF22';ctx.beginPath();ctx.arc(0,5,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2222FF';ctx.beginPath();ctx.arc(5,5,2,0,Math.PI*2);ctx.fill();
      break;
    case 'star_wand':
      ctx.fillStyle='#CC88FF';ctx.fillRect(-3,2,6,18);
      ctx.strokeStyle='#FF88FF';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(3,6);ctx.quadraticCurveTo(10,4,12,8);ctx.stroke();
      ctx.save();ctx.translate(0,-6);
      ctx.fillStyle='#FFFF00';ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=(i*Math.PI/5)-Math.PI/2, r=i%2===0?12:5;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      break;
  }
  ctx.restore();
}

function drawCrownItem(item){drawCrownShape(item.x,item.y,CROWN_W,CROWN_H);}
function drawCrownShape(cx,cy,w,h){
  const hw=w/2,bandH=h*0.42,spikeH=h*0.62,bandTop=cy-bandH/2;
  ctx.fillStyle='#FFD700';
  ctx.beginPath();ctx.moveTo(cx-hw,bandTop);ctx.lineTo(cx-hw+w/3,bandTop);ctx.lineTo(cx-hw+w/6,bandTop-spikeH);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx-w/6,bandTop);ctx.lineTo(cx+w/6,bandTop);ctx.lineTo(cx,bandTop-spikeH*1.25);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+hw-w/3,bandTop);ctx.lineTo(cx+hw,bandTop);ctx.lineTo(cx+hw-w/6,bandTop-spikeH);ctx.closePath();ctx.fill();
  ctx.fillStyle='#DAA520';ctx.fillRect(cx-hw+1,bandTop+2,w,bandH);
  ctx.fillStyle='#FFD700';ctx.fillRect(cx-hw,bandTop,w,bandH);
  ctx.strokeStyle='#B8860B';ctx.lineWidth=1.5;ctx.strokeRect(cx-hw,bandTop,w,bandH);
  const gr=Math.max(3,h*0.14);
  ctx.fillStyle='#CC0000';ctx.beginPath();ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FF6666';ctx.beginPath();ctx.arc(cx-gr*0.3,cy-gr*0.35,gr*0.4,0,Math.PI*2);ctx.fill();
}
function drawDumbbell(item){
  const bR=DUMBBELL_BALL_R,bW=DUMBBELL_BAR_W,cx=item.x,cy=item.y;
  ctx.fillStyle='#999999';ctx.fillRect(cx-bW/2,cy-3,bW,6);
  ctx.fillStyle='#777777';ctx.beginPath();ctx.arc(cx-bW/2,cy,bR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#BBBBBB';ctx.beginPath();ctx.arc(cx-bW/2-3,cy-4,bR*0.35,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#777777';ctx.beginPath();ctx.arc(cx+bW/2,cy,bR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#BBBBBB';ctx.beginPath();ctx.arc(cx+bW/2-3,cy-4,bR*0.35,0,Math.PI*2);ctx.fill();
}

function drawPlayer(){
  if(!player.blinkVisible) return;
  const x=player.x,y=player.y,stun=player.stunTimer>0;
  const skin=stun?'#FFE033':'#FFCC88',body=stun?'#FFD000':'#3355EE',leg=stun?'#FFD000':'#1A2A88';
  ctx.save();ctx.translate(x,y);
  const lw=9,lh=30,la=player.legAngle;
  // 足
  ctx.save();ctx.translate(-10,14);ctx.rotate(la);ctx.fillStyle=leg;ctx.fillRect(-lw/2,0,lw,lh);
  ctx.fillStyle='#222222';ctx.fillRect(-lw/2-3,lh-7,lw+8,7);ctx.restore();
  ctx.save();ctx.translate(10,14);ctx.rotate(-la);ctx.fillStyle=leg;ctx.fillRect(-lw/2,0,lw,lh);
  ctx.fillStyle='#222222';ctx.fillRect(-lw/2-3,lh-7,lw+8,7);ctx.restore();
  // 腕
  ctx.save();ctx.translate(-20,-12);ctx.rotate(-0.25-la*0.4);ctx.fillStyle=body;ctx.fillRect(-28,-4,28,8);
  ctx.fillStyle=skin;ctx.beginPath();ctx.arc(-28,0,6,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(20,-12);ctx.rotate(0.25+la*0.4);ctx.fillStyle=body;ctx.fillRect(0,-4,28,8);
  ctx.fillStyle=skin;ctx.beginPath();ctx.arc(28,0,6,0,Math.PI*2);ctx.fill();ctx.restore();
  // 手持ちアイテム
  if(player.heldType){
    ctx.save();ctx.translate(46,-10);ctx.scale(0.72,0.72);drawHeldIcon(player.heldType);ctx.restore();
  }
  // 胴体
  ctx.fillStyle=body;ctx.fillRect(-18,-30,36,44);
  ctx.strokeStyle=stun?'#AA6600':'#1133AA';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(0,14);ctx.stroke();
  // 首・頭
  ctx.fillStyle=skin;ctx.fillRect(-7,-36,14,10);
  const hR=20;ctx.beginPath();ctx.arc(0,-52,hR,0,Math.PI*2);
  ctx.fillStyle=skin;ctx.fill();ctx.strokeStyle=stun?'#CC8800':'#D4A070';ctx.lineWidth=1.5;ctx.stroke();
  // 顔
  if(stun){
    ctx.strokeStyle='#FF3300';ctx.lineWidth=2.5;ctx.beginPath();
    ctx.moveTo(-12,-58);ctx.lineTo(-6,-52);ctx.moveTo(-6,-58);ctx.lineTo(-12,-52);
    ctx.moveTo(6,-58);ctx.lineTo(12,-52);ctx.moveTo(12,-58);ctx.lineTo(6,-52);ctx.stroke();
  } else {
    ctx.fillStyle='#333333';ctx.beginPath();ctx.arc(-8,-55,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-55,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-47,7,0.1,Math.PI-0.1);ctx.stroke();
  }
  if(stun){
    ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='#FFE000';ctx.fillText('⚡',0,-74);ctx.textBaseline='alphabetic';
  }
  // 帽子/王冠
  if(player.hasCrown){
    const ch=16,bh=ch*0.42;drawCrownShape(0,-(52+hR)-bh/2+2,30,ch);
  } else if(player.hatType){
    ctx.save();ctx.translate(0,-(52+hR)-8);drawHatIcon(player.hatType);ctx.restore();
  }
  ctx.restore();
}

function drawCollection(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFFFFF';ctx.font='bold 26px sans-serif';
  ctx.fillText('📖 図鑑',CANVAS_W/2,22);

  // 収集率サマリー
  const hg=ALL_HAT_KEYS.filter(k=>collection.hats[k].normal+collection.hats[k].rare>0).length;
  const hd=HELD_TYPES.filter(k=>collection.held[k].normal+collection.held[k].rare>0).length;
  const hr=ALL_HAT_KEYS.filter(k=>collection.hats[k].rare>0).length;
  const dr=HELD_TYPES.filter(k=>collection.held[k].rare>0).length;
  ctx.fillStyle='#AAAAAA';ctx.font='13px sans-serif';
  ctx.fillText('帽子 '+hg+'/'+ALL_HAT_KEYS.length+' (Rare '+hr+')  持ち物 '+hd+'/'+HELD_TYPES.length+' (Rare '+dr+')',CANVAS_W/2,44);

  // タブボタン
  const t1x=55,t1y=56,t1w=340,th=36;
  const t2x=405,t2y=56,t2w=340;
  ctx.fillStyle=collectionTab==='hats'?'#446688':'#223344';fillRoundRect(t1x,t1y,t1w,th,8);
  ctx.fillStyle=collectionTab==='hats'?'#FFFFFF':'#888888';ctx.font='bold 16px sans-serif';
  ctx.fillText('🎩 帽子（'+ALL_HAT_KEYS.length+'種）',t1x+t1w/2,t1y+th/2);
  ctx.fillStyle=collectionTab==='held'?'#446688':'#223344';fillRoundRect(t2x,t2y,t2w,th,8);
  ctx.fillStyle=collectionTab==='held'?'#FFFFFF':'#888888';
  ctx.fillText('🎒 持ち物（'+HELD_TYPES.length+'種）',t2x+t2w/2,t2y+th/2);

  // グリッド
  if(collectionTab==='hats'){
    drawCollectionGrid(ALL_HAT_KEYS,'hats',HAT_NAMES,55,98,3,230,100);
  } else {
    drawCollectionGrid(HELD_TYPES,'held',HELD_NAMES,40,98,5,144,74);
  }

  // ボタン
  const bBx=55,bBy=552,bBw=150,bBh=40;
  ctx.fillStyle='#445566';fillRoundRect(bBx,bBy,bBw,bBh,10);
  ctx.fillStyle='#FFFFFF';ctx.font='bold 18px sans-serif';ctx.textBaseline='middle';
  ctx.fillText('◀ もどる',bBx+bBw/2,bBy+bBh/2);
  const rBx=CANVAS_W-205,rBy=552,rBw=150,rBh=40;
  ctx.fillStyle='#663322';fillRoundRect(rBx,rBy,rBw,rBh,10);
  ctx.fillStyle='#FFAAAA';ctx.fillText('🗑 リセット',rBx+rBw/2,rBy+rBh/2);
  ctx.fillStyle='#444444';ctx.font='12px sans-serif';
  ctx.fillText('ESCキーでもどる',CANVAS_W/2,592);
  ctx.textBaseline='alphabetic';
}

function drawCollectionGrid(keys,category,nameMap,startX,startY,cols,cellW,cellH){
  keys.forEach((key,idx)=>{
    const col=idx%cols, row=Math.floor(idx/cols);
    const cx=startX+col*cellW+cellW/2, top=startY+row*cellH;
    const entry=(category==='hats')?collection.hats[key]:collection.held[key];
    const total=(entry.normal||0)+(entry.rare||0);
    const seen=total>0;

    // セル背景
    ctx.fillStyle=seen?'rgba(255,255,255,0.10)':'rgba(0,0,0,0.35)';
    fillRoundRect(cx-cellW/2+3,top+2,cellW-6,cellH-4,7);

    // アイコン
    ctx.save();ctx.translate(cx,top+Math.floor(cellH*0.38));
    if(!seen) ctx.globalAlpha=0.25;
    if(category==='hats'){
      if(key==='crown') drawCrownShape(0,4,32,22);
      else drawHatIcon(key);
    } else {
      const sc=cols>=5?0.75:1.0;ctx.scale(sc,sc);drawHeldIcon(key);ctx.scale(1/sc,1/sc);
    }
    ctx.globalAlpha=1;ctx.restore();

    // テキスト
    const nameY=top+Math.floor(cellH*0.76);
    const countY=top+Math.floor(cellH*0.92);
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(seen){
      ctx.fillStyle='#DDDDDD';ctx.font=(cols>=5?'11px':'12px')+' sans-serif';
      // 名前が長い場合は小さくする
      const name=nameMap[key]||key;
      ctx.font=(name.length>6&&cols>=5?'9px':'11px')+' sans-serif';
      ctx.fillText(name,cx,nameY);
      ctx.fillStyle='#FFCC44';ctx.font='bold '+(cols>=5?'11px':'12px')+' sans-serif';
      ctx.fillText('N:'+entry.normal+' R:'+(entry.rare||0),cx,countY);
    } else {
      ctx.fillStyle='#555555';ctx.font=(cols>=5?'12px':'13px')+' sans-serif';
      ctx.fillText('???',cx,nameY);
    }
    // Rare済みバッジ
    if(entry.rare>0){
      ctx.fillStyle='#FFD700';ctx.font='bold 10px sans-serif';
      ctx.fillText('★',cx+cellW/2-10,top+10);
    }
    // Lucky表示
    if(key===luckyItem){
      ctx.fillStyle='#FFFF44';ctx.font='bold 9px sans-serif';
      ctx.fillText('Lucky!',cx-cellW/2+14,top+10);
    }
  });
  ctx.textBaseline='alphabetic';
}

// ================================================================
//  クリック処理
// ================================================================
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=CANVAS_W/rect.width,sy=CANVAS_H/rect.height;
  const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;

  // サウンドボタン
  if(inRect(mx,my,CANVAS_W-120,10,110,30)){
    initAudio(); soundOn=!soundOn;
    if(!soundOn) stopBGM(); else if(gameState==='playing') playBGM();
    return;
  }

  if(gameState==='title'){
    if(inRect(mx,my,CANVAS_W/2-135,440,270,50)){initAudio();gameState='collection';return;}
    tryStart(); return;
  }
  if(gameState==='gameover'){
    if(inRect(mx,my,CANVAS_W/2-135,358,270,46)){tryStart();return;}
    if(inRect(mx,my,CANVAS_W/2-135,416,270,46)){gameState='collection';return;}
    return;
  }
  if(gameState==='collection'){
    // タブ
    if(inRect(mx,my,55,56,340,36)){collectionTab='hats';return;}
    if(inRect(mx,my,405,56,340,36)){collectionTab='held';return;}
    // BACK
    if(inRect(mx,my,55,552,150,40)){gameState='title';return;}
    // RESET
    if(inRect(mx,my,CANVAS_W-205,552,150,40)){
      if(confirm('図鑑データをリセットしますか？\n（ベストスコアは保持されます）')){
        const best=collection.meta.bestScore||0;
        collection=makeEmptyCollection(); collection.meta.bestScore=best; saveCollection();
      }
      return;
    }
  }
});

// ================================================================
//  メインループ
// ================================================================
function gameLoop(timestamp){ update(timestamp); draw(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
