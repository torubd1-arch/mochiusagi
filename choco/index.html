<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チョコキャッチ！</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ================================================================
//  定数
// ================================================================
const CANVAS_W            = 800;
const CANVAS_H            = 600;
const GAME_DURATION       = 30;
const PLAYER_SPEED        = 320;
const PLAYER_W            = 44;
const PLAYER_H            = 90;
const STUN_DURATION       = 1.5;
const STUN_BLINK_INTERVAL = 0.2;
const SPAWN_RATE_MIN      = 3;
const SPAWN_RATE_MAX      = 5;
const FALL_SPEED_MIN      = 250;
const FALL_SPEED_MAX      = 450;
const CHOCO_SIZE          = 32;
const DUMBBELL_BAR_W      = 48;
const DUMBBELL_BALL_R     = 11;
const POPUP_DURATION      = 0.9;
const NEW_POPUP_DURATION  = 0.8;
const SPECIAL_POPUP_DUR   = 0.85;
const GROUND_Y            = CANVAS_H - 70;
const LS_KEY              = 'chocoGame_highScore';
const LAST_SECONDS        = 5;
const RARE_CHANCE         = 0.08;

const BROWN_CHOCO_SCORE   = 1;
const PURPLE_CHOCO_SCORE  = 2;
const HAT_SCORE           = 3;
const HELD_SCORE          = 3;

const SPAWN_RATIO_BROWN    = 0.45;
const SPAWN_RATIO_PURPLE   = 0.10;
const SPAWN_RATIO_DUMBBELL = 0.18;
const SPAWN_RATIO_HAT      = 0.12;
// HELD = 残り 0.15

const HAT_ITEM_W           = 36;
const HAT_ITEM_H           = 36;
const HELD_ITEM_W          = 36;
const HELD_ITEM_H          = 36;

const BGM_BPM              = 150;
const BGM_BPM_FAST         = 195;
const BGM_VOL_NORM         = 0.40;
const BGM_VOL_LAST         = 0.65;

// ================================================================
//  カラーバリエーション（5色）
// ================================================================
const COLOR_VARIANTS = [
  {id:'red',   hex:'#ff4d4d', name:'赤'},
  {id:'blue',  hex:'#4d79ff', name:'青'},
  {id:'green', hex:'#4dff88', name:'緑'},
  {id:'black', hex:'#555555', name:'黒'},
  {id:'gold',  hex:'#FFD700', name:'金'},
];
const COLOR_HEX  = Object.fromEntries(COLOR_VARIANTS.map(c=>[c.id,c.hex]));
const COLOR_NAME = Object.fromEntries(COLOR_VARIANTS.map(c=>[c.id,c.name]));

// ================================================================
//  アイテム定義（18ベース × 5色 = 90種）
// ================================================================
const HAT_BASE_TYPES = [
  'cap','beanie','top_hat','wizard','helmet','crown',
  'crown_prince','crown_queen','beret','cowboy','ninja','pirate',
  'chef','santa','bunny','flower','cat_ears','headband',
];
const HELD_BASE_TYPES = [
  'controller','tote','backpack','suitcase','box',
  'bicycle','bobblehead','icecream',
  'camera','umbrella','book','flower','smartphone',
  'flashlight','microphone','plush','donut','star_wand',
];

// 全IDリスト生成（各90種）
const ALL_HAT_IDS = [];
for (const base of HAT_BASE_TYPES) for (const cv of COLOR_VARIANTS) ALL_HAT_IDS.push(`${base}_${cv.id}`);
const ALL_HELD_IDS = [];
for (const base of HELD_BASE_TYPES) for (const cv of COLOR_VARIANTS) ALL_HELD_IDS.push(`${base}_${cv.id}`);

const HAT_BASE_NAMES = {
  cap:'キャップ', beanie:'ニット帽', top_hat:'シルクハット', wizard:'魔法帽', helmet:'ヘルメット',
  crown:'王冠', crown_prince:'王子冠', crown_queen:'女王冠', beret:'ベレー帽', cowboy:'カウボーイ帽',
  ninja:'忍者頭巾', pirate:'海賊帽', chef:'シェフ帽', santa:'サンタ帽', bunny:'うさぎ耳',
  flower:'花かんむり', cat_ears:'猫耳', headband:'ヘアバンド',
};
const HELD_BASE_NAMES = {
  controller:'コントローラー', tote:'トートバッグ', backpack:'リュック',
  suitcase:'スーツケース', box:'ハコ', bicycle:'自転車', bobblehead:'ボブルヘッド',
  icecream:'アイス', camera:'カメラ', umbrella:'かさ', book:'ほん',
  flower:'はな', smartphone:'スマホ', flashlight:'かいちゅう電灯',
  microphone:'マイク', plush:'ぬいぐるみ', donut:'ドーナツ', star_wand:'ほしのつえ',
};

function parseItemId(id) {
  for (const cv of COLOR_VARIANTS) {
    if (id.endsWith('_'+cv.id)) return {base:id.slice(0,-(cv.id.length+1)), colorId:cv.id};
  }
  return {base:id, colorId:null};
}
function getItemName(id) {
  const {base, colorId} = parseItemId(id);
  const bn = HAT_BASE_NAMES[base] || HELD_BASE_NAMES[base] || base;
  return colorId ? `${bn}(${COLOR_NAME[colorId]||colorId})` : bn;
}

// ================================================================
//  Lucky Item（日替わり・IDで一致判定）
// ================================================================
const ALL_ITEM_IDS = [...ALL_HAT_IDS, ...ALL_HELD_IDS]; // 180種
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function hashStringToInt(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h*31)+str.charCodeAt(i))|0;
  return Math.abs(h);
}
function selectLuckyItem() {
  return ALL_ITEM_IDS[hashStringToInt(getTodayKey()) % ALL_ITEM_IDS.length];
}
const luckyItem = selectLuckyItem();

// ================================================================
//  色ユーティリティ
// ================================================================
function shadeColor(hex, amt) {
  const cl = v => Math.max(0,Math.min(255,v));
  const r=cl(parseInt(hex.slice(1,3),16)+amt);
  const g=cl(parseInt(hex.slice(3,5),16)+amt);
  const b=cl(parseInt(hex.slice(5,7),16)+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ================================================================
//  スコア計算
// ================================================================
function calculateScore(cat, id, variant) {
  if (cat==='choco_brown') return BROWN_CHOCO_SCORE;
  if (cat==='choco_purple') return PURPLE_CHOCO_SCORE;
  const base = (cat==='hat') ? HAT_SCORE : HELD_SCORE;
  let mult = 1;
  if (variant==='rare') mult *= 2;
  if (id && id===luckyItem) mult *= 2;
  return base * mult;
}

// ================================================================
//  図鑑システム v3
// ================================================================
const COLLECTION_KEY = 'collection_v3';

function makeEmptyCollection() {
  const hats = {}; for (const id of ALL_HAT_IDS) hats[id]={normal:0,rare:0};
  const held = {}; for (const id of ALL_HELD_IDS) held[id]={normal:0,rare:0};
  return {version:3, hats, held, meta:{plays:0, bestScore:0, fullCompleteOnce:false}};
}
function loadCollection() {
  try {
    const raw = localStorage.getItem(COLLECTION_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.version===3) {
        if (!d.hats) d.hats={};
        if (!d.held) d.held={};
        if (!d.meta) d.meta={plays:0,bestScore:0,fullCompleteOnce:false};
        if (d.meta.fullCompleteOnce===undefined) d.meta.fullCompleteOnce=false;
        for (const id of ALL_HAT_IDS)  if (!d.hats[id]) d.hats[id]={normal:0,rare:0};
        for (const id of ALL_HELD_IDS) if (!d.held[id]) d.held[id]={normal:0,rare:0};
        return d;
      }
    }
    // v2からv3への移行: IDベースが異なるためリセット
  } catch(e) {}
  return makeEmptyCollection();
}
function saveCollection() { localStorage.setItem(COLLECTION_KEY, JSON.stringify(collection)); }
let collection = loadCollection();

// ================================================================
//  BGMフレーズ
// ================================================================
const BGM_NOTES = [
  [523.25,1],[659.25,1],[783.99,1],[659.25,1],
  [587.33,1],[698.46,1],[880.00,1],[698.46,1],
  [659.25,1],[783.99,1],[987.77,1],[783.99,1],
  [1046.50,2],[783.99,2],
];

// ================================================================
//  Canvas
// ================================================================
const canvas = document.getElementById('gameCanvas');
canvas.width=CANVAS_W; canvas.height=CANVAS_H;
const ctx = canvas.getContext('2d');

// ================================================================
//  音響システム
// ================================================================
let audioCtx=null, masterGain=null, bgmGain=null, seGain=null;
let bgmSchedulerTimer=null, bgmNoteIndex=0, bgmNextTime=0, soundOn=true;

function initAudio() {
  if (audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=0.25; masterGain.connect(audioCtx.destination);
  bgmGain=audioCtx.createGain(); bgmGain.gain.value=BGM_VOL_NORM; bgmGain.connect(masterGain);
  seGain=audioCtx.createGain(); seGain.gain.value=1.0; seGain.connect(masterGain);
}
function scheduleOneBGMNote(ni, st) {
  const [freq,beats]=BGM_NOTES[ni];
  const isFast=(timeLeft<=LAST_SECONDS&&gameState==='playing');
  const dur=(60/(isFast?BGM_BPM_FAST:BGM_BPM)/2)*beats;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.connect(g); g.connect(bgmGain); osc.type='square'; osc.frequency.value=freq;
  g.gain.setValueAtTime(0.3,st); g.gain.exponentialRampToValueAtTime(0.001,st+dur*0.82);
  osc.start(st); osc.stop(st+dur); return dur;
}
function scheduleBGMNotes() {
  if (!audioCtx||!soundOn||gameState!=='playing') return;
  bgmGain.gain.setTargetAtTime(timeLeft<=LAST_SECONDS?BGM_VOL_LAST:BGM_VOL_NORM,audioCtx.currentTime,0.05);
  while (bgmNextTime<audioCtx.currentTime+0.12) {
    const dur=scheduleOneBGMNote(bgmNoteIndex,bgmNextTime);
    bgmNextTime+=dur; bgmNoteIndex=(bgmNoteIndex+1)%BGM_NOTES.length;
  }
  bgmSchedulerTimer=setTimeout(scheduleBGMNotes,50);
}
function playBGM() {
  if (!audioCtx||!soundOn) return;
  stopBGM(); bgmNoteIndex=0; bgmNextTime=audioCtx.currentTime+0.05; scheduleBGMNotes();
}
function stopBGM() {
  if (bgmSchedulerTimer!==null){clearTimeout(bgmSchedulerTimer);bgmSchedulerTimer=null;}
}

function playSE(type) {
  if (!audioCtx||!soundOn) return;
  const t=audioCtx.currentTime;
  const tone=(freqs,dur=0.08,vol=0.18,wave='square',gap=0.07)=>{
    freqs.forEach((freq,i)=>{
      const nt=t+i*gap, osc=audioCtx.createOscillator(), g=audioCtx.createGain();
      osc.connect(g); g.connect(seGain); osc.type=wave; osc.frequency.setValueAtTime(freq,nt);
      osc.frequency.linearRampToValueAtTime(freq*1.1,nt+dur);
      g.gain.setValueAtTime(vol,nt); g.gain.exponentialRampToValueAtTime(0.001,nt+dur);
      osc.start(nt); osc.stop(nt+dur);
    });
  };
  if (type==='chocolate')       tone([800,1200],0.08,0.15,'square',0.08);
  else if (type==='purple_choco') tone([1200,1600],0.10,0.18,'square',0.10);
  else if (type==='hat')        tone([600,900],0.07,0.18,'square',0.07);
  else if (type==='held')       tone([750,950],0.07,0.18,'square',0.07);
  else if (type==='rare')       tone([700,1050,1300],0.09,0.20,'square',0.09);
  else if (type==='lucky')      tone([900,1100,1400,1700],0.10,0.22,'triangle',0.09);
  else if (type==='new_item')   tone([700,1000,1400],0.09,0.22,'square',0.10);
  else if (type==='crown')      tone([800,1200,1600],0.07,0.22,'square',0.07);
  else if (type==='dumbbell') {
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.connect(g);g.connect(seGain);osc.type='square';
    osc.frequency.setValueAtTime(300,t);osc.frequency.linearRampToValueAtTime(120,t+0.2);
    g.gain.setValueAtTime(0.30,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    osc.start(t);osc.stop(t+0.2);
  } else if (type==='start') tone([400,800],0.15,0.20,'square',0.15);
  else if (type==='gameover') {
    [523.25,392.00,261.63].forEach((freq,i)=>{
      const nt=t+i*0.13,osc=audioCtx.createOscillator(),g=audioCtx.createGain();
      osc.connect(g);g.connect(seGain);osc.type='square';osc.frequency.value=freq;
      g.gain.setValueAtTime(0.25,nt);g.gain.exponentialRampToValueAtTime(0.001,nt+0.11);
      osc.start(nt);osc.stop(nt+0.12);
    });
  } else if (type==='fullcomplete') {
    // 上昇アルペジオ（長め）
    [261.63,329.63,392.00,523.25,659.25,783.99,1046.50,1318.51].forEach((freq,i)=>{
      const nt=t+i*0.11, osc=audioCtx.createOscillator(), g=audioCtx.createGain();
      osc.connect(g);g.connect(seGain);osc.type='triangle';osc.frequency.value=freq;
      g.gain.setValueAtTime(0.28,nt);g.gain.exponentialRampToValueAtTime(0.001,nt+0.45);
      osc.start(nt);osc.stop(nt+0.46);
    });
  }
}

// ================================================================
//  ゲーム変数
// ================================================================
let gameState='title', score=0, timeLeft=GAME_DURATION;
let highScore=Number(localStorage.getItem(LS_KEY)||0);
let lastTime=0, spawnTimer=0, timerBlinkTimer=0, timerBlinkVisible=true;
let screenFlashTimer=0, screenFlashColor='#FFFFFF';
let specialPopupText='', specialPopupTimer=0;
let sessionHats=[], sessionHeld=[];
let collectionTab='hats', collectionPage=0;

// フルコンプリート演出
let fullCompleteTimer=0, fullCompleteIsFirst=false, fullCompleteParticles=[];
let fullCompleteRainbowTimer=0;

/** @type {Array} */ let items=[];
/** @type {Array} */ let popups=[];
/** @type {Array} */ let newPopups=[];

// ================================================================
//  プレイヤー
// ================================================================
const player={
  x:CANVAS_W/2, y:GROUND_Y,
  stunTimer:0, blinkTimer:0, blinkVisible:true,
  legAngle:0, legSwingDir:1, isMoving:false,
  hasCrown:false, hatBase:null, hatColorId:null, heldBase:null, heldColorId:null,
};

// ================================================================
//  入力
// ================================================================
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ') tryStart();
  if(e.key==='Escape'&&gameState==='collection') gameState='title';
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ================================================================
//  ユーティリティ
// ================================================================
const rand=(a,b)=>Math.random()*(b-a)+a;
function fillRoundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();ctx.fill();
}
function inRect(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}

// ================================================================
//  ゲームリセット
// ================================================================
function resetGame(){
  score=0; timeLeft=GAME_DURATION; items=[]; popups=[]; newPopups=[];
  spawnTimer=1/rand(SPAWN_RATE_MIN,SPAWN_RATE_MAX); lastTime=0;
  timerBlinkTimer=0; timerBlinkVisible=true;
  screenFlashTimer=0; specialPopupText=''; specialPopupTimer=0;
  fullCompleteTimer=0; fullCompleteParticles=[];
  sessionHats=[]; sessionHeld=[];
  player.x=CANVAS_W/2; player.stunTimer=0; player.blinkTimer=0; player.blinkVisible=true;
  player.legAngle=0; player.legSwingDir=1; player.isMoving=false;
  player.hasCrown=false; player.hatBase=null; player.hatColorId=null;
  player.heldBase=null; player.heldColorId=null;
  collection.meta.plays=(collection.meta.plays||0)+1; saveCollection();
  gameState='playing'; playSE('start'); playBGM();
}
function tryStart(){
  if(gameState==='title'||gameState==='gameover'){initAudio();resetGame();}
}

// ================================================================
//  アイテム生成
// ================================================================
function spawnItem(){
  const r=Math.random();
  if(r<SPAWN_RATIO_BROWN){
    items.push({cat:'choco_brown',x:rand(60,CANVAS_W-60),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
  } else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE){
    items.push({cat:'choco_purple',x:rand(60,CANVAS_W-60),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
  } else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE+SPAWN_RATIO_DUMBBELL){
    items.push({cat:'dumbbell',x:rand(80,CANVAS_W-80),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
  } else if(r<SPAWN_RATIO_BROWN+SPAWN_RATIO_PURPLE+SPAWN_RATIO_DUMBBELL+SPAWN_RATIO_HAT){
    const base=HAT_BASE_TYPES[Math.floor(Math.random()*HAT_BASE_TYPES.length)];
    const colorId=COLOR_VARIANTS[Math.floor(Math.random()*COLOR_VARIANTS.length)].id;
    const variant=Math.random()<RARE_CHANCE?'rare':'normal';
    const id=`${base}_${colorId}`;
    items.push({cat:'hat',base,colorId,variant,id,x:rand(60,CANVAS_W-60),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
  } else {
    const base=HELD_BASE_TYPES[Math.floor(Math.random()*HELD_BASE_TYPES.length)];
    const colorId=COLOR_VARIANTS[Math.floor(Math.random()*COLOR_VARIANTS.length)].id;
    const variant=Math.random()<RARE_CHANCE?'rare':'normal';
    const id=`${base}_${colorId}`;
    items.push({cat:'held',base,colorId,variant,id,x:rand(60,CANVAS_W-60),y:-40,speed:rand(FALL_SPEED_MIN,FALL_SPEED_MAX)});
  }
}

// ================================================================
//  衝突判定
// ================================================================
function checkCollision(item){
  const hw=PLAYER_W/2, hh=PLAYER_H/2;
  let iHW,iHH;
  if(item.cat==='choco_brown'||item.cat==='choco_purple'){iHW=CHOCO_SIZE/2;iHH=CHOCO_SIZE/2;}
  else if(item.cat==='hat'){iHW=HAT_ITEM_W/2;iHH=HAT_ITEM_H/2;}
  else if(item.cat==='held'){iHW=HELD_ITEM_W/2;iHH=HELD_ITEM_H/2;}
  else{iHW=DUMBBELL_BAR_W/2+DUMBBELL_BALL_R;iHH=DUMBBELL_BALL_R;}
  return Math.abs(player.x-item.x)<hw+iHW && Math.abs(player.y-item.y)<hh+iHH;
}

// ================================================================
//  図鑑更新・フルコンプリート
// ================================================================
function collectItem(cat, id, variant, ix, iy){
  const tbl=(cat==='hat')?collection.hats:collection.held;
  if(!tbl[id]) tbl[id]={normal:0,rare:0};
  const entry=tbl[id];
  const isNew=(entry.normal+entry.rare)===0;
  entry[variant]=(entry[variant]||0)+1;
  saveCollection();
  if(isNew) newPopups.push({x:ix,y:iy-30,timer:NEW_POPUP_DURATION});
  checkFullComplete(isNew);
  return isNew;
}
function checkFullComplete(isNew){
  if(!isNew) return;
  const hatsDone=ALL_HAT_IDS.every(id=>(collection.hats[id]?.normal||0)+(collection.hats[id]?.rare||0)>0);
  const heldDone=ALL_HELD_IDS.every(id=>(collection.held[id]?.normal||0)+(collection.held[id]?.rare||0)>0);
  if(hatsDone&&heldDone){
    fullCompleteIsFirst=!collection.meta.fullCompleteOnce;
    if(!collection.meta.fullCompleteOnce){
      collection.meta.fullCompleteOnce=true; saveCollection();
    }
    triggerFullComplete();
  }
}
function triggerFullComplete(){
  fullCompleteTimer=fullCompleteIsFirst?2.5:0.8;
  fullCompleteRainbowTimer=0;
  fullCompleteParticles=[];
  if(fullCompleteIsFirst){
    playSE('fullcomplete');
    for(let i=0;i<40;i++){
      const angle=(i/40)*Math.PI*2;
      fullCompleteParticles.push({
        x:CANVAS_W/2, y:CANVAS_H/2,
        vx:Math.cos(angle)*rand(80,260), vy:Math.sin(angle)*rand(80,260),
        color:['#FF0000','#FF8800','#FFFF00','#00FF88','#0088FF','#8800FF','#FF00FF'][i%7],
        r:rand(5,11), life:rand(1.4,2.4),
      });
    }
  }
}
function applySpecialEffect(isLucky,isRare){
  if(isLucky&&isRare){
    specialPopupText='RARE LUCKY! x4'; screenFlashColor='#FFD700';
  } else if(isLucky){
    specialPopupText='LUCKY! x2'; screenFlashColor='#FFFF88';
  } else {
    specialPopupText='RARE! x2'; screenFlashColor='#CC88FF';
  }
  specialPopupTimer=SPECIAL_POPUP_DUR; screenFlashTimer=0.22;
  playSE(isLucky?'lucky':'rare');
}

// ================================================================
//  更新
// ================================================================
function update(timestamp){
  if(gameState!=='playing') return;
  if(lastTime===0){lastTime=timestamp;return;}
  const dt=Math.min((timestamp-lastTime)/1000,0.05); lastTime=timestamp;

  timeLeft-=dt;
  if(timeLeft<=0){
    timeLeft=0;
    if(score>highScore){highScore=score;localStorage.setItem(LS_KEY,highScore);}
    if(score>(collection.meta.bestScore||0)){collection.meta.bestScore=score;saveCollection();}
    gameState='gameover'; stopBGM(); playSE('gameover'); return;
  }

  if(timeLeft<=LAST_SECONDS){
    timerBlinkTimer+=dt;
    if(timerBlinkTimer>=0.25){timerBlinkTimer=0;timerBlinkVisible=!timerBlinkVisible;}
  } else {timerBlinkTimer=0;timerBlinkVisible=true;}
  if(screenFlashTimer>0) screenFlashTimer=Math.max(0,screenFlashTimer-dt);
  if(specialPopupTimer>0) specialPopupTimer=Math.max(0,specialPopupTimer-dt);
  if(fullCompleteTimer>0){
    fullCompleteTimer=Math.max(0,fullCompleteTimer-dt);
    fullCompleteRainbowTimer+=dt;
    for(const p of fullCompleteParticles){
      p.x+=p.vx*dt; p.y+=p.vy*dt;
      p.vy+=200*dt; // gravity
      p.life=Math.max(0,p.life-dt);
    }
  }

  // スタン
  if(player.stunTimer>0){
    player.stunTimer-=dt; player.blinkTimer+=dt;
    if(player.blinkTimer>=STUN_BLINK_INTERVAL){player.blinkTimer=0;player.blinkVisible=!player.blinkVisible;}
    if(player.stunTimer<=0){player.stunTimer=0;player.blinkVisible=true;}
  }

  // 移動
  player.isMoving=false;
  if(player.stunTimer<=0){
    const left=keys['ArrowLeft']||keys['a']||keys['A'];
    const right=keys['ArrowRight']||keys['d']||keys['D'];
    if(left) {player.x-=PLAYER_SPEED*dt;player.isMoving=true;}
    if(right){player.x+=PLAYER_SPEED*dt;player.isMoving=true;}
    player.x=Math.max(PLAYER_W/2,Math.min(CANVAS_W-PLAYER_W/2,player.x));
  }

  // 足アニメ
  if(player.isMoving){
    player.legAngle+=player.legSwingDir*dt*7;
    if(Math.abs(player.legAngle)>0.55) player.legSwingDir*=-1;
  } else {player.legAngle*=0.85;if(Math.abs(player.legAngle)<0.01)player.legAngle=0;}

  // スポーン
  spawnTimer-=dt;
  if(spawnTimer<=0){spawnTimer=1/rand(SPAWN_RATE_MIN,SPAWN_RATE_MAX);spawnItem();}

  // アイテム更新
  for(let i=items.length-1;i>=0;i--){
    const item=items[i];
    item.y+=item.speed*dt;
    if(item.y>CANVAS_H+40){items.splice(i,1);continue;}
    if(!checkCollision(item)) continue;

    if(item.cat==='choco_brown'){
      score+=BROWN_CHOCO_SCORE;
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+1',color:'#FF8800'});
      playSE('chocolate');

    } else if(item.cat==='choco_purple'){
      score+=PURPLE_CHOCO_SCORE;
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+2',color:'#CC88FF'});
      playSE('purple_choco');

    } else if(item.cat==='hat'){
      const gain=calculateScore('hat',item.id,item.variant);
      score+=gain;
      player.hatBase=item.base; player.hatColorId=item.colorId;
      player.hasCrown=item.base.startsWith('crown');
      if(player.hasCrown) playSE('crown');
      sessionHats.push(item.id);
      const isLucky=item.id===luckyItem, isRare=item.variant==='rare';
      const pColor=isRare?'#FFD700':(isLucky?'#FFFF44':'#88FF88');
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+'+gain,color:pColor});
      const isNew=collectItem('hat',item.id,item.variant,item.x,item.y);
      if(isLucky||isRare) applySpecialEffect(isLucky,isRare);
      else if(isNew) playSE('new_item');
      else if(!player.hasCrown) playSE('hat');

    } else if(item.cat==='held'){
      const gain=calculateScore('held',item.id,item.variant);
      score+=gain;
      player.heldBase=item.base; player.heldColorId=item.colorId;
      sessionHeld.push(item.id);
      const isLucky=item.id===luckyItem, isRare=item.variant==='rare';
      const pColor=isRare?'#FFD700':(isLucky?'#FFFF44':'#AADDFF');
      popups.push({x:item.x,y:item.y,timer:POPUP_DURATION,text:'+'+gain,color:pColor});
      const isNew=collectItem('held',item.id,item.variant,item.x,item.y);
      if(isLucky||isRare) applySpecialEffect(isLucky,isRare);
      else if(isNew) playSE('new_item');
      else playSE('held');

    } else if(item.cat==='dumbbell'&&player.stunTimer<=0){
      player.stunTimer=STUN_DURATION; player.blinkTimer=0; player.blinkVisible=true;
      playSE('dumbbell');
    }
    items.splice(i,1);
  }

  // ポップアップ更新
  for(let i=popups.length-1;i>=0;i--){
    popups[i].timer-=dt; popups[i].y-=50*dt;
    if(popups[i].timer<=0) popups.splice(i,1);
  }
  for(let i=newPopups.length-1;i>=0;i--){
    newPopups[i].timer-=dt; newPopups[i].y-=35*dt;
    if(newPopups[i].timer<=0) newPopups.splice(i,1);
  }
}

// ================================================================
//  描画メイン
// ================================================================
function draw(){
  ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
  drawBackground();
  if(gameState==='title'){
    drawTitle();
  } else if(gameState==='collection'){
    drawCollection();
  } else {
    for(const item of items){
      if(item.cat==='choco_brown') drawChocolate(item,false);
      else if(item.cat==='choco_purple') drawChocolate(item,true);
      else if(item.cat==='hat') drawFallingHat(item);
      else if(item.cat==='held') drawFallingHeld(item);
      else drawDumbbell(item);
    }
    drawPlayer();
    drawHUD();
    drawPopups();
    drawNewPopups();
    drawSpecialPopup();
    if(screenFlashTimer>0){
      ctx.save();ctx.globalAlpha=(screenFlashTimer/0.22)*0.40;
      ctx.fillStyle=screenFlashColor;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);ctx.restore();
    }
    drawFullCompleteAnim();
    if(gameState==='gameover') drawGameOver();
  }
  drawSoundButton();
}

// ────────────────────────────────────────────────────────────────
//  背景
// ────────────────────────────────────────────────────────────────
function drawBackground(){
  if(gameState==='collection'){
    const g=ctx.createLinearGradient(0,0,0,CANVAS_H);
    g.addColorStop(0,'#0d0d2e');g.addColorStop(1,'#1a1a3e');
    ctx.fillStyle=g;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);return;
  }
  const g=ctx.createLinearGradient(0,0,0,CANVAS_H);
  g.addColorStop(0,'#87CEEB');g.addColorStop(1,'#D0EEFF');
  ctx.fillStyle=g;ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  const gt=GROUND_Y+PLAYER_H/2+2;
  ctx.fillStyle='#A0785A';ctx.fillRect(0,gt,CANVAS_W,CANVAS_H-gt);
  ctx.fillStyle='#4CAF50';ctx.fillRect(0,gt,CANVAS_W,8);
}

      ctx.fillStyle='#33AA00';ctx.beginPath();ctx.ellipse(-5,8,6,3,-0.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c;
      for(let a=0;a<Math.PI*2;a+=Math.PI/3){
        ctx.beginPath();ctx.ellipse(Math.cos(a)*8,Math.sin(a)*8-2,5,3,a,0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#FFDD00';ctx.beginPath();ctx.arc(0,-2,5,0,Math.PI*2);ctx.fill();
      break;
    case 'smartphone':
      ctx.fillStyle=c;ctx.fillRect(-9,-16,18,32);
      ctx.fillStyle='#88CCFF';ctx.fillRect(-7,-13,14,24);
      ctx.fillStyle=d;ctx.beginPath();ctx.arc(0,13,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(0,-14,1.5,0,Math.PI*2);ctx.fill();
      break;
    case 'flashlight':
      ctx.fillStyle=c;
      ctx.beginPath();ctx.moveTo(-9,-8);ctx.lineTo(9,-8);ctx.lineTo(7,0);ctx.lineTo(-7,0);ctx.closePath();ctx.fill();
      ctx.fillStyle=d;ctx.fillRect(-6,0,12,16);
      ctx.fillStyle='#FFFFCC';ctx.beginPath();ctx.arc(0,-5,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(-2,-7,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=d;ctx.fillRect(-6,15,12,3);
      break;
    case 'microphone':
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(0,-8,8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=l;ctx.lineWidth=1;
      for(let i=-5;i<=5;i+=2.5){ctx.beginPath();ctx.moveTo(i,-15);ctx.lineTo(i,-1);ctx.stroke();}
      ctx.fillStyle=d;ctx.fillRect(-4,0,8,18);
      ctx.fillStyle=l;ctx.fillRect(-5,14,10,3);
      break;
    case 'plush':
      ctx.fillStyle=c;
      ctx.beginPath();ctx.arc(0,5,11,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(0,-7,9,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(-7,-14,5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(7,-14,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=l;
      ctx.beginPath();ctx.arc(-7,-14,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(7,-14,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.arc(-3,-8,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3,-8,1.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#884422';ctx.beginPath();ctx.arc(0,-5,2,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-3,3,0.1,Math.PI-0.1);ctx.stroke();
      break;
    case 'donut':
      ctx.strokeStyle=c;ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#8B4513';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.stroke();
      ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();
      [[-6,-8,0],[9,2,1],[-8,5,2],[5,9,3],[0,-12,4],[-3,10,0]].forEach(([sx,sy,ci])=>{
        const cc=['#FF2222','#2222FF','#22BB22','#FFFF22','#FF88FF'][ci];
        ctx.fillStyle=cc;ctx.save();ctx.translate(sx,sy);ctx.rotate(0.5);ctx.fillRect(-1,-3.5,2,7);ctx.restore();
      });
      break;
    case 'star_wand':
      ctx.fillStyle=c;ctx.fillRect(-3,2,6,18);
      ctx.strokeStyle=l;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(3,6);ctx.quadraticCurveTo(10,4,12,8);ctx.stroke();
      ctx.save();ctx.translate(0,-6);
      ctx.fillStyle='#FFFF00';ctx.beginPath();
      for(let i=0;i<10;i++){
        const a=(i*Math.PI/5)-Math.PI/2, r=i%2===0?12:5;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#FFFFFF';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
      ctx.restore();
      break;
  }
  ctx.restore();
}

function drawPlayer(){
  if(!player.blinkVisible) return;
  const x=player.x,y=player.y,stun=player.stunTimer>0;
  const skin=stun?'#FFE033':'#FFCC88',body=stun?'#FFD000':'#3355EE',leg=stun?'#FFD000':'#1A2A88';
  ctx.save();ctx.translate(x,y);

  const lw=9,lh=30,la=player.legAngle;
  ctx.save();ctx.translate(-10,14);ctx.rotate(la);ctx.fillStyle=leg;ctx.fillRect(-lw/2,0,lw,lh);
  ctx.fillStyle='#222222';ctx.fillRect(-lw/2-3,lh-7,lw+8,7);ctx.restore();
  ctx.save();ctx.translate(10,14);ctx.rotate(-la);ctx.fillStyle=leg;ctx.fillRect(-lw/2,0,lw,lh);
  ctx.fillStyle='#222222';ctx.fillRect(-lw/2-3,lh-7,lw+8,7);ctx.restore();

  ctx.save();ctx.translate(-20,-12);ctx.rotate(-0.25-la*0.4);ctx.fillStyle=body;ctx.fillRect(-28,-4,28,8);
  ctx.fillStyle=skin;ctx.beginPath();ctx.arc(-28,0,6,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(20,-12);ctx.rotate(0.25+la*0.4);ctx.fillStyle=body;ctx.fillRect(0,-4,28,8);
  ctx.fillStyle=skin;ctx.beginPath();ctx.arc(28,0,6,0,Math.PI*2);ctx.fill();ctx.restore();

  // 手持ちアイテム
  if(player.heldBase){
    const hc=COLOR_HEX[player.heldColorId]||'#888888';
    ctx.save();ctx.translate(46,-10);ctx.scale(0.72,0.72);drawHeldIcon(player.heldBase,hc);ctx.restore();
  }

  ctx.fillStyle=body;ctx.fillRect(-18,-30,36,44);
  ctx.strokeStyle=stun?'#AA6600':'#1133AA';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,-30);ctx.lineTo(0,14);ctx.stroke();

  ctx.fillStyle=skin;ctx.fillRect(-7,-36,14,10);
  const hR=20;ctx.beginPath();ctx.arc(0,-52,hR,0,Math.PI*2);
  ctx.fillStyle=skin;ctx.fill();ctx.strokeStyle=stun?'#CC8800':'#D4A070';ctx.lineWidth=1.5;ctx.stroke();

  if(stun){
    ctx.strokeStyle='#FF3300';ctx.lineWidth=2.5;ctx.beginPath();
    ctx.moveTo(-12,-58);ctx.lineTo(-6,-52);ctx.moveTo(-6,-58);ctx.lineTo(-12,-52);
    ctx.moveTo(6,-58);ctx.lineTo(12,-52);ctx.moveTo(12,-58);ctx.lineTo(6,-52);ctx.stroke();
  } else {
    ctx.fillStyle='#333333';ctx.beginPath();ctx.arc(-8,-55,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(8,-55,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-47,7,0.1,Math.PI-0.1);ctx.stroke();
  }
  if(stun){
    ctx.font='bold 22px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='#FFE000';ctx.fillText('⚡',0,-74);ctx.textBaseline='alphabetic';
  }

  // 帽子
  if(player.hatBase){
    const hc=COLOR_HEX[player.hatColorId]||'#888888';
    ctx.save();ctx.translate(0,-(52+hR)-8);
    if(player.hasCrown) ctx.scale(1.1,1.1); // 王冠系は少し大きく
    drawHatIcon(player.hatBase,hc);
    ctx.restore();
  }
  ctx.restore();
}

// ────────────────────────────────────────────────────────────────
//  フルコンプリート演出
// ────────────────────────────────────────────────────────────────
function drawFullCompleteAnim(){
  if(fullCompleteTimer<=0) return;
  const ratio=fullCompleteTimer/(fullCompleteIsFirst?2.5:0.8);

  // 虹フラッシュ（初回のみ）
  if(fullCompleteIsFirst){
    const rh=fullCompleteRainbowTimer*3;
    const r=Math.sin(rh)*127+128;
    const g=Math.sin(rh+2)*127+128;
    const b=Math.sin(rh+4)*127+128;
    ctx.save();ctx.globalAlpha=0.25;
    ctx.fillStyle=`rgb(${r|0},${g|0},${b|0})`;
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);ctx.restore();

    // パーティクル
    ctx.save();
    for(const p of fullCompleteParticles){
      if(p.life<=0) continue;
      ctx.globalAlpha=Math.min(1,p.life*1.5);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  // テキスト
  ctx.save();
  const alpha=Math.min(1,ratio*1.5);
  ctx.globalAlpha=alpha;
  const pulse=1+Math.sin(fullCompleteRainbowTimer*8)*0.04;
  ctx.translate(CANVAS_W/2,CANVAS_H/2);ctx.scale(pulse,pulse);
  if(fullCompleteIsFirst){
    ctx.fillStyle='rgba(0,0,0,0.7)';fillRoundRect(-230,-55,460,110,20);
    ctx.fillStyle='#FFD700';ctx.shadowColor='#FF8800';ctx.shadowBlur=30;
    ctx.font='bold 42px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('👑 FULL COMPLETE! 👑',0,0);
    ctx.shadowBlur=0;
    ctx.fillStyle='#FFFFFF';ctx.font='18px sans-serif';
    ctx.fillText('帽子90種 + 持ち物90種 コンプリート！',0,38);
  } else {
    ctx.fillStyle='rgba(0,0,0,0.6)';fillRoundRect(-200,-32,400,64,16);
    ctx.fillStyle='#FFD700';
    ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✨ FULL COMPLETE! ✨',0,0);
  }
  ctx.restore();ctx.textBaseline='alphabetic';
}

  ctx.fillStyle='rgba(0,0,20,0.80)';ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFFFFF';ctx.font='bold 44px sans-serif';ctx.fillText('ゲーム終了！',CANVAS_W/2,52);
  ctx.fillStyle='#FFD700';ctx.font='bold 32px sans-serif';ctx.fillText('スコア: '+score+' 点',CANVAS_W/2,96);
  ctx.fillStyle='#88CCFF';ctx.font='18px sans-serif';ctx.fillText('最高スコア: '+highScore+' 点',CANVAS_W/2,128);
  if(score>0&&score>=highScore){
    ctx.fillStyle='#FF6600';ctx.font='bold 16px sans-serif';ctx.fillText('🎉 新記録！',CANVAS_W/2,152);
  }

  // 取得内訳
  const px=50,py=170,pw=CANVAS_W-100,ph=148;
  ctx.fillStyle='rgba(255,255,255,0.07)';fillRoundRect(px,py,pw,ph,10);
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.rect(px,py,pw,ph);ctx.stroke();

  ctx.textAlign='left';
  ctx.fillStyle='#FFEE88';ctx.font='bold 13px sans-serif';ctx.fillText('今回の収集',px+12,py+18);

  const uH=[...new Set(sessionHats)], uHd=[...new Set(sessionHeld)];
  ctx.fillStyle='#AAFFAA';ctx.font='12px sans-serif';
  const hStr=uH.length>0?uH.slice(0,8).map(id=>getItemName(id)).join('、')+(uH.length>8?'…':''):'なし';
  ctx.fillText('帽子: '+hStr,px+12,py+42);
  ctx.fillStyle='#AADDFF';
  const hdStr=uHd.length>0?uHd.slice(0,8).map(id=>getItemName(id)).join('、')+(uHd.length>8?'…':''):'なし';
  ctx.fillText('持物: '+hdStr,px+12,py+66);

  const hatGot=ALL_HAT_IDS.filter(id=>(collection.hats[id]?.normal||0)+(collection.hats[id]?.rare||0)>0).length;
  const heldGot=ALL_HELD_IDS.filter(id=>(collection.held[id]?.normal||0)+(collection.held[id]?.rare||0)>0).length;
  const hatRare=ALL_HAT_IDS.filter(id=>(collection.hats[id]?.rare||0)>0).length;
  const heldRare=ALL_HELD_IDS.filter(id=>(collection.held[id]?.rare||0)>0).length;
  ctx.fillStyle='#DDDDDD';ctx.font='12px sans-serif';
  ctx.fillText('Hat: '+hatGot+'/90  Rare: '+hatRare+'/90',px+12,py+100);
  ctx.textAlign='right';
  ctx.fillText('Held: '+heldGot+'/90  Rare: '+heldRare+'/90',px+pw-12,py+100);
  if(collection.meta.fullCompleteOnce){
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700';ctx.font='bold 13px sans-serif';
    ctx.fillText('👑 FULL COMPLETE達成済み！',px+pw/2,py+126);
  }
  ctx.textAlign='center';

  const bx=CANVAS_W/2-135,by=336,bw=270,bh=44;
  ctx.fillStyle='#FF5500';fillRoundRect(bx,by,bw,bh,12);
  ctx.fillStyle='#FFFFFF';ctx.font='bold 20px sans-serif';ctx.fillText('もう一度遊ぶ',CANVAS_W/2,by+bh/2);
  const cbx=CANVAS_W/2-135,cby=392,cbw=270,cbh=44;
  ctx.fillStyle='#225588';fillRoundRect(cbx,cby,cbw,cbh,12);
  ctx.fillStyle='#88CCFF';ctx.font='bold 18px sans-serif';ctx.fillText('📖 図鑑を見る',CANVAS_W/2,cby+cbh/2);
  ctx.textBaseline='alphabetic';
}

// ────────────────────────────────────────────────────────────────
//  図鑑画面（ページ切替：30件/ページ、3ページ）
// ────────────────────────────────────────────────────────────────
const COLL_COLS = 10;
const COLL_ROWS = 3;
const COLL_PAGE_SIZE = COLL_COLS * COLL_ROWS; // 30
const COLL_CELL_W = 76;
const COLL_CELL_H = 88;
const COLL_START_X = (CANVAS_W - COLL_COLS * COLL_CELL_W) / 2; // 20
const COLL_START_Y = 100;

function drawCollection(){
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#FFFFFF';ctx.font='bold 24px sans-serif';
  ctx.fillText('📖 図鑑',CANVAS_W/2,20);

  // 収集率サマリー
  const hg=ALL_HAT_IDS.filter(id=>(collection.hats[id]?.normal||0)+(collection.hats[id]?.rare||0)>0).length;
  const hd=ALL_HELD_IDS.filter(id=>(collection.held[id]?.normal||0)+(collection.held[id]?.rare||0)>0).length;
  const hr=ALL_HAT_IDS.filter(id=>(collection.hats[id]?.rare||0)>0).length;
  const dr=ALL_HELD_IDS.filter(id=>(collection.held[id]?.rare||0)>0).length;
  ctx.fillStyle='#AAAAAA';ctx.font='12px sans-serif';
  ctx.fillText('帽子 '+hg+'/90 (★'+hr+')  持ち物 '+hd+'/90 (★'+dr+')',CANVAS_W/2,40);

  // タブボタン
  const t1x=50,ty=55,tw=340,th=34;
  const t2x=410;
  ctx.fillStyle=collectionTab==='hats'?'#446688':'#223344';fillRoundRect(t1x,ty,tw,th,8);
  ctx.fillStyle=collectionTab==='hats'?'#FFFFFF':'#888888';ctx.font='bold 14px sans-serif';
  ctx.fillText('🎩 帽子（90種）',t1x+tw/2,ty+th/2);
  ctx.fillStyle=collectionTab==='held'?'#446688':'#223344';fillRoundRect(t2x,ty,tw,th,8);
  ctx.fillStyle=collectionTab==='held'?'#FFFFFF':'#888888';
  ctx.fillText('🎒 持ち物（90種）',t2x+tw/2,ty+th/2);

  // グリッド描画
  const ids=collectionTab==='hats'?ALL_HAT_IDS:ALL_HELD_IDS;
  const tbl=collectionTab==='hats'?collection.hats:collection.held;
  const pageStart=collectionPage*COLL_PAGE_SIZE;
  const pageIds=ids.slice(pageStart, pageStart+COLL_PAGE_SIZE);

  pageIds.forEach((id,idx)=>{
    const col=idx%COLL_COLS, row=Math.floor(idx/COLL_COLS);
    const cx=COLL_START_X+col*COLL_CELL_W+COLL_CELL_W/2;
    const top=COLL_START_Y+row*COLL_CELL_H;
    const entry=tbl[id]||{normal:0,rare:0};
    const total=(entry.normal||0)+(entry.rare||0);
    const seen=total>0;
    const {base,colorId}=parseItemId(id);
    const hex=COLOR_HEX[colorId]||'#FFFFFF';
    const isLucky=id===luckyItem;

    // セル背景
    ctx.fillStyle=seen?'rgba(255,255,255,0.09)':'rgba(0,0,0,0.40)';
    fillRoundRect(cx-COLL_CELL_W/2+2,top+2,COLL_CELL_W-4,COLL_CELL_H-4,6);

    // カラーリング
    if(seen){
      ctx.strokeStyle=hex;ctx.lineWidth=2;ctx.globalAlpha=0.7;
      ctx.beginPath();ctx.arc(cx,top+32,18,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    }

    // アイコン
    ctx.save();ctx.translate(cx,top+32);
    if(!seen) ctx.globalAlpha=0.20;
    if(collectionTab==='hats'){
      ctx.scale(0.58,0.58);drawHatIcon(base, seen?hex:'#888888');
    } else {
      ctx.scale(0.55,0.55);drawHeldIcon(base, seen?hex:'#888888');
    }
    ctx.globalAlpha=1;ctx.restore();

    // テキスト
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(seen){
      const bn=HAT_BASE_NAMES[base]||HELD_BASE_NAMES[base]||base;
      const cname=COLOR_NAME[colorId]||'';
      ctx.fillStyle=hex;ctx.font='8px sans-serif';
      ctx.fillText(cname,cx,top+56);
      ctx.fillStyle='#DDDDDD';ctx.font='9px sans-serif';
      const nameStr=bn.length>5?bn.slice(0,5)+'…':bn;
      ctx.fillText(nameStr,cx,top+67);
      ctx.fillStyle='#FFCC44';ctx.font='bold 9px sans-serif';
      ctx.fillText('N:'+entry.normal+' R:'+(entry.rare||0),cx,top+79);
    } else {
      ctx.fillStyle='#444444';ctx.font='14px sans-serif';
      ctx.fillText('???',cx,top+66);
    }
    // Rare済みバッジ
    if((entry.rare||0)>0){
      ctx.fillStyle='#FFD700';ctx.font='bold 9px sans-serif';
      ctx.fillText('★',cx+COLL_CELL_W/2-9,top+10);
    }
    // Lucky表示
    if(isLucky){
      ctx.fillStyle='#FFFF44';ctx.font='bold 8px sans-serif';
      ctx.fillText('L',cx-COLL_CELL_W/2+8,top+10);
    }
  });

  // ページ情報・Prev/Next
  const totalPages=3;
  const piY=COLL_START_Y+COLL_ROWS*COLL_CELL_H+10; // y≈374
  ctx.fillStyle='#AAAAAA';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(`ページ ${collectionPage+1} / ${totalPages}`,CANVAS_W/2,piY+10);

  const prevBx=CANVAS_W/2-130,nextBx=CANVAS_W/2+30,navBy=piY+24,navBw=100,navBh=32;
  ctx.fillStyle=collectionPage>0?'#336699':'#222244';fillRoundRect(prevBx,navBy,navBw,navBh,8);
  ctx.fillStyle=collectionPage>0?'#FFFFFF':'#555555';ctx.font='bold 14px sans-serif';
  ctx.fillText('◀ Prev',prevBx+navBw/2,navBy+navBh/2);
  ctx.fillStyle=collectionPage<totalPages-1?'#336699':'#222244';fillRoundRect(nextBx,navBy,navBw,navBh,8);
  ctx.fillStyle=collectionPage<totalPages-1?'#FFFFFF':'#555555';
  ctx.fillText('Next ▶',nextBx+navBw/2,navBy+navBh/2);

  // Backボタン・Resetボタン
  const bBx=40,bBy=piY+65,bBw=130,bBh=36;
  ctx.fillStyle='#445566';fillRoundRect(bBx,bBy,bBw,bBh,8);
  ctx.fillStyle='#FFFFFF';ctx.font='bold 16px sans-serif';
  ctx.fillText('◀ もどる',bBx+bBw/2,bBy+bBh/2);
  const rBx=CANVAS_W-170,rBy=piY+65,rBw=130,rBh=36;
  ctx.fillStyle='#663322';fillRoundRect(rBx,rBy,rBw,rBh,8);
  ctx.fillStyle='#FFAAAA';ctx.fillText('🗑 リセット',rBx+rBw/2,rBy+rBh/2);

  ctx.fillStyle='#444444';ctx.font='11px sans-serif';
  ctx.fillText('ESCキーでもどる',CANVAS_W/2,piY+116);
  ctx.textBaseline='alphabetic';
}

// ================================================================
//  クリック処理
// ================================================================
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=CANVAS_W/rect.width, sy=CANVAS_H/rect.height;
  const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;

  // サウンドボタン
  if(inRect(mx,my,CANVAS_W-120,10,110,30)){
    initAudio(); soundOn=!soundOn;
    if(!soundOn) stopBGM(); else if(gameState==='playing') playBGM();
    return;
  }

  if(gameState==='title'){
    if(inRect(mx,my,CANVAS_W/2-135,362,270,48)){initAudio();collectionPage=0;gameState='collection';return;}
    tryStart(); return;
  }
  if(gameState==='gameover'){
    if(inRect(mx,my,CANVAS_W/2-135,336,270,44)){tryStart();return;}
    if(inRect(mx,my,CANVAS_W/2-135,392,270,44)){collectionPage=0;gameState='collection';return;}
    return;
  }
  if(gameState==='collection'){
    // タブ
    if(inRect(mx,my,50,55,340,34)){collectionTab='hats';collectionPage=0;return;}
    if(inRect(mx,my,410,55,340,34)){collectionTab='held';collectionPage=0;return;}

    // Prev/Next ページ
    const piY=COLL_START_Y+COLL_ROWS*COLL_CELL_H+10;
    const navBy=piY+24,navBw=100,navBh=32;
    const prevBx=CANVAS_W/2-130, nextBx=CANVAS_W/2+30;
    if(inRect(mx,my,prevBx,navBy,navBw,navBh)){if(collectionPage>0){collectionPage--;} return;}
    if(inRect(mx,my,nextBx,navBy,navBw,navBh)){if(collectionPage<2){collectionPage++;} return;}

    // Back
    const bBy=piY+65;
    if(inRect(mx,my,40,bBy,130,36)){gameState='title';return;}
    // Reset
    if(inRect(mx,my,CANVAS_W-170,bBy,130,36)){
      if(confirm('図鑑データをリセットしますか？\n（ベストスコアは保持されます）')){
        const best=collection.meta.bestScore||0;
        collection=makeEmptyCollection(); collection.meta.bestScore=best; saveCollection();
      }
      return;
    }
  }
});

// ================================================================
//  メインループ
// ================================================================
function gameLoop(timestamp){ update(timestamp); draw(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
